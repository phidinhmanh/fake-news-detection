# Model Training Configuration
# Người B quản lý

model:
  name: "xlm-roberta-base"
  num_labels: 2

training:
  batch_size: 32
  learning_rate: 2.0e-5
  epochs: 10
  max_seq_length: 256
  warmup_ratio: 0.1
  weight_decay: 0.01

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules:
    - query
    - value

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

logging:
  log_every_n_steps: 50
  save_top_k: 3
  monitor: "val_f1"
  mode: "max"

targets:
  baseline_f1: 0.72
  lora_f1: 0.85
  ensemble_auc: 0.90
  latency_seconds: 3.0
